<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>土地開發綜合試算工具</title>
    
    <meta name="theme-color" content="#be595b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="manifest" href="manifest.json">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'text': '#0e0606',
                        'background': '#fbf5f5',
                        'primary': '#be595b',
                        'secondary': '#d2d695',
                        'accent': '#a7cd7e',
                    }
                }
            }
        }
    </script>
    <style>
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .tabs-container { display: flex; overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch; }
        .tab-btn { flex: 0 0 auto; padding: 12px 16px; }
        #historySection { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; }
        #historySection.expanded { max-height: 1000px; }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body class="bg-background text-text min-h-screen flex flex-col items-center p-4">

    <div id="appContainer" class="bg-white w-full max-w-md rounded-2xl shadow-xl p-6 space-y-6">
        <div class="text-center border-b pb-4 border-gray-100">
            <h1 class="text-xl font-bold text-text">土地開發綜合評估報告 📋</h1>
            <p class="text-xs text-gray-400 mt-1">產出日期：<span id="pdfDate">未評估</span></p>
        </div>

        <div class="tabs-container no-scrollbar border-b border-gray-200 no-print">
            <button id="tabFeedback" onclick="switchTab('feedback')" class="tab-btn text-xs font-bold border-b-2 border-primary text-primary focus:outline-none">回饋金 💰</button>
            <button id="tabSolar" onclick="switchTab('solar')" class="tab-btn text-xs font-bold border-b-2 border-transparent text-gray-400 focus:outline-none">太陽能 ☀️</button>
            <button id="tabUtility" onclick="switchTab('utility')" class="tab-btn text-xs font-bold border-b-2 border-transparent text-gray-400 focus:outline-none">水電 💧</button>
            <button id="tabBridge" onclick="switchTab('bridge')" class="tab-btn text-xs font-bold border-b-2 border-transparent text-gray-400 focus:outline-none">架橋規費 🌉</button>
        </div>

        <div id="sectionFeedback" class="space-y-4 no-print">
            <div><label class="block text-sm font-semibold text-text mb-1">地段地號</label><input type="text" id="landNote1" placeholder="例如：某某段 123 地號" class="w-full px-4 py-2 border rounded-xl focus:ring-2 focus:ring-secondary focus:outline-none text-sm border-gray-200"></div>
            <div><label class="block text-sm font-semibold text-text mb-1">土地面積 (㎡)</label><div class="relative"><input type="number" inputmode="decimal" id="area" placeholder="請輸入面積" oninput="syncPing()" class="w-full pl-4 pr-12 py-2 border rounded-xl focus:ring-2 focus:ring-secondary focus:outline-none text-sm border-gray-200"><span class="absolute right-4 top-2 text-sm text-gray-400 font-medium">㎡</span></div><p id="pingHint" class="text-xs text-gray-400 mt-1 text-right">約 0.00 坪</p></div>
            <div><label class="block text-sm font-semibold text-text mb-1">公告現值 (元/㎡)</label><div class="relative"><input type="number" inputmode="decimal" id="presentValue" placeholder="請輸入當期公告現值" class="w-full pl-4 pr-16 py-2 border rounded-xl focus:ring-2 focus:ring-secondary focus:outline-none text-sm border-gray-200"><span class="absolute right-4 top-2 text-sm text-gray-400 font-medium">元/㎡</span></div></div>
            <div><label class="block text-sm font-semibold text-text mb-2">回饋金比例</label><div class="grid grid-cols-2 gap-2"><button id="btnFeedbackDefault" onclick="setFeedbackRate(0.50, this)" class="feedback-rate-btn border p-3 rounded-xl text-base font-bold border-primary bg-background text-primary">特目變更 (50%)</button><div class="border rounded-xl p-1 flex items-center bg-background border-gray-200"><span class="text-xs text-gray-400 pl-2">自訂</span><input type="number" inputmode="decimal" id="customFeedbackRate" placeholder="請輸入" oninput="setCustomFeedbackRate()" class="w-full bg-transparent px-2 text-center text-base focus:outline-none font-bold text-text"><span class="text-sm text-gray-400 pr-2">%</span></div></div></div>
        </div>

        <div id="sectionSolar" class="hidden space-y-4 no-print">
            <div><label class="block text-sm font-semibold text-text mb-1">地段地號</label><input type="text" id="landNote2" placeholder="例如：某某段 123 地號" class="w-full px-4 py-2 border rounded-xl focus:ring-2 focus:ring-secondary focus:outline-none text-sm border-gray-200"></div>
            <div><label class="block text-sm font-semibold text-text mb-1">屋頂坪數 (坪)</label><div class="relative"><input type="number" inputmode="decimal" id="solarPing" placeholder="請輸入屋頂坪數" oninput="syncSolarKW()" class="w-full pl-4 pr-12 py-2 border rounded-xl focus:ring-2 focus:ring-secondary focus:outline-none text-sm border-gray-200"><span class="absolute right-4 top-2 text-sm text-gray-400 font-medium">坪</span></div><p id="solarKwHint" class="text-xs text-primary mt-1 text-right font-medium">預估發電量約：0.00 KW</p></div>
            <div><label class="block text-sm font-semibold text-text mb-1">日照時間 (小時/天)</label><div class="relative"><input type="number" inputmode="decimal" id="solarSunHours" value="3.5" step="0.1" class="w-full pl-4 pr-16 py-2 border rounded-xl focus:ring-2 focus:ring-secondary focus:outline-none text-sm border-gray-200"><span class="absolute right-4 top-2 text-sm text-gray-400 font-medium">小時/天</span></div></div>
            <div><label class="block text-sm font-semibold text-text mb-2">收購費率 (元/度)</label><div class="grid grid-cols-2 gap-2"><button id="btnFitDefault" onclick="setFitRate(3.8772, this)" class="fit-rate-btn border p-2.5 rounded-xl text-sm font-bold border-primary bg-background text-primary">3.8772 元</button><div class="border rounded-xl p-1 flex items-center bg-background border-gray-200"><span class="text-xs text-gray-400 pl-2">自訂</span><input type="number" inputmode="decimal" id="customFitRate" placeholder="請輸入" step="0.0001" oninput="setCustomFitRate()" class="w-full bg-transparent px-1 text-center text-sm focus:outline-none font-bold text-text"></div></div></div>
            <div><label class="block text-sm font-semibold text-text mb-2">租金分潤</label><div class="grid grid-cols-3 gap-2"><button id="btnSolarDefault" onclick="setSolarRate(0.20, this)" class="solar-rate-btn border p-2.5 rounded-xl text-sm font-bold border-primary bg-background text-primary">20%</button><button onclick="setSolarRate(0.25, this)" class="solar-rate-btn border p-2.5 rounded-xl text-sm font-bold text-gray-500 bg-white hover:bg-background border-gray-200">25%</button><div class="border rounded-xl p-1 flex items-center bg-background border-gray-200"><input type="number" inputmode="decimal" id="customSolarRate" placeholder="自訂" oninput="setCustomSolarRate()" class="w-full bg-transparent text-center text-sm focus:outline-none font-bold text-text"><span class="text-xs text-gray-400 pr-1">%</span></div></div></div>
        </div>

        <div id="sectionUtility" class="hidden space-y-5 no-print">
            <div class="bg-background p-4 rounded-xl border border-gray-200 space-y-3"><h3 class="text-sm font-bold text-text">⚡ 馬力換算 KW</h3><div><label class="block text-xs font-semibold text-gray-400 mb-1">輸入馬力數 (HP)</label><div class="relative"><input type="number" inputmode="decimal" id="hpValue" placeholder="請輸入馬力" class="w-full pl-4 pr-16 py-2 border rounded-xl focus:ring-2 focus:ring-secondary focus:outline-none text-sm bg-white border-gray-200"><span class="absolute right-4 top-2 text-sm text-gray-400 font-medium">馬力</span></div></div></div>
            <div class="bg-background p-4 rounded-xl border border-gray-200 space-y-3"><h3 class="text-sm font-bold text-text">💧 用水量換算</h3><div><label class="block text-xs font-semibold text-gray-400 mb-1">廠區人數 (人)</label><div class="relative"><input type="number" inputmode="numeric" id="peopleCount" placeholder="請輸入人數" class="w-full pl-4 pr-12 py-2 border rounded-xl focus:ring-2 focus:ring-secondary focus:outline-none text-sm bg-white border-gray-200"><span class="absolute right-4 top-2 text-sm text-gray-400 font-medium">人</span></div></div></div>
        </div>

        <div id="sectionBridge" class="hidden space-y-4 no-print">
            <div><label class="block text-sm font-semibold text-text mb-1">地段地號</label><input type="text" id="landNote3" placeholder="例如：某某段 123 地號" class="w-full px-4 py-2 border rounded-xl focus:ring-2 focus:ring-secondary focus:outline-none text-sm border-gray-200"></div>
            <div class="grid grid-cols-2 gap-3"><div><label class="block text-sm font-semibold text-text mb-1">預計長度 (M)</label><input type="number" inputmode="decimal" id="bridgeLength" placeholder="長" step="0.01" class="w-full px-4 py-2 border rounded-xl text-sm border-gray-200"></div><div><label class="block text-sm font-semibold text-text mb-1">預計寬度 (M)</label><input type="number" inputmode="decimal" id="bridgeWidth" placeholder="寬" step="0.01" class="w-full px-4 py-2 border rounded-xl text-sm border-gray-200"></div></div>
            <div><label class="block text-sm font-semibold text-text mb-1">渠道公告現值 (元/㎡)</label><input type="number" inputmode="decimal" id="bridgeLandValue" placeholder="請輸入公告現值" class="w-full px-4 py-2 border rounded-xl text-sm border-gray-200"></div>
            <div><label class="block text-sm font-semibold text-text mb-2">架橋設置狀態</label><div class="grid grid-cols-2 gap-2"><button id="btnBridgeNew" onclick="setBridgeStatus(20, this)" class="bridge-status-btn border p-3 rounded-xl text-sm font-bold border-primary bg-background text-primary">新設 (20年)</button><button onclick="setBridgeStatus(25, this)" class="bridge-status-btn border p-3 rounded-xl text-sm font-bold text-gray-500 bg-white hover:bg-background border-gray-200">既設 (25年)</button></div></div>
        </div>

        <button onclick="performCalculation()" class="w-full bg-primary hover:opacity-90 text-white font-bold py-3 rounded-xl shadow-lg transition duration-200 no-print">開始計算 🚀</button>

        <div id="resultCard" class="hidden bg-background rounded-2xl p-5 border border-secondary/30 space-y-4">
            <div id="visibleResult">
                <div>
                    <h3 class="text-sm font-bold text-primary border-b border-secondary/30 pb-1">📊 試算結果：<span id="resNote">無紀錄</span></h3>
                    <p class="text-[10px] text-gray-400 mt-1">評估類別：<span id="resCategory" class="font-semibold text-text">-</span></p>
                </div>
                <div id="resFeedbackGroup" class="space-y-2 hidden">
                    <div class="flex justify-between text-sm"><span>土地面積：</span><span id="resAreaText" class="font-semibold">0 ㎡</span></div>
                    <div class="flex justify-between text-sm"><span>公告現值：</span><span id="resPresentValueText" class="font-semibold">$0</span></div>
                    <div class="flex justify-between text-sm"><span>回饋金比例：</span><span id="resRate" class="font-semibold">0%</span></div>
                    <div class="flex justify-between items-center text-base font-bold text-primary pt-2 border-t border-secondary/30"><span>💰 預估回饋金：</span><span id="resFeedbackFee" class="text-xl">$0</span></div>
                </div>
                <div id="resSolarGroup" class="space-y-2 hidden">
                    <div class="flex justify-between text-sm"><span>屋頂坪數：</span><span id="resSolarPingValue" class="font-semibold">0 坪</span></div>
                    <div class="flex justify-between text-sm"><span>發電容量：</span><span id="resSolarKwValue" class="font-semibold">0 KW</span></div>
                    <div class="flex justify-between items-center text-base font-bold text-primary pt-2 border-t border-secondary/30"><span>☀️ 年度租金收益：</span><span id="resSolarRent" class="text-xl">$0</span></div>
                </div>
                <div id="resUtilityGroup" class="space-y-2 hidden">
                    <div class="flex justify-between text-sm"><span>電力需求：</span><span id="resKw" class="font-semibold">0 KW</span></div>
                    <div class="flex justify-between text-sm"><span>日用水量：</span><span id="resWater" class="font-semibold">0 CMD</span></div>
                </div>
                <div id="resBridgeGroup" class="space-y-2 hidden">
                    <div class="flex justify-between text-sm"><span>架橋面積：</span><span id="resBridgeArea" class="font-semibold">0 ㎡</span></div>
                    <div class="flex justify-between items-center text-base font-bold text-primary pt-2 border-t border-secondary/30"><span>🌉 預估總規費：</span><span id="resBridgeTotal" class="text-xl">$0</span></div>
                </div>
            </div>
            <button onclick="exportToPDF()" class="w-full bg-accent hover:opacity-90 text-text font-semibold py-2.5 rounded-xl shadow no-print flex items-center justify-center space-x-2 text-sm"><span>匯出 PDF 報告 📄</span></button>
        </div>

        <div class="border-t pt-4 no-print">
            <button onclick="toggleHistory()" class="flex items-center justify-between w-full text-sm font-bold text-gray-500"><span>歷史紀錄 📜</span><span id="historyChevron">▼</span></button>
            <div id="historySection" class="mt-3 space-y-2"><div id="historyList" class="space-y-2"></div><button onclick="clearHistory()" id="btnClearHistory" class="hidden w-full text-[10px] text-gray-400 underline">清除紀錄</button></div>
        </div>
    </div>

    <script>
        let currentMode = 'feedback'; let feedbackRate = 0.50; let solarRate = 0.20; let fitRate = 3.8772; let bridgeMultiplier = 20;
        function switchTab(mode) {
            currentMode = mode; document.getElementById('resultCard').classList.add('hidden');
            ['feedback', 'solar', 'utility', 'bridge'].forEach(k => {
                document.getElementById('tab'+k.charAt(0).toUpperCase()+k.slice(1)).className = (k===mode) ? "tab-btn text-xs font-bold border-b-2 border-primary text-primary" : "tab-btn text-xs font-bold border-b-2 border-transparent text-gray-400";
                document.getElementById('section'+k.charAt(0).toUpperCase()+k.slice(1)).classList.toggle('hidden', k!==mode);
            });
        }
        function syncPing() { const val = parseFloat(document.getElementById('area').value); document.getElementById('pingHint').innerText = val ? `約 ${(val*0.3025).toFixed(2)} 坪` : `約 0.00 坪`; }
        function syncSolarKW() { const val = parseFloat(document.getElementById('solarPing').value); document.getElementById('solarKwHint').innerText = val ? `預估發電量： ${(val/2).toFixed(2)} KW` : `預估發電量：0.00 KW`; }
        function setFeedbackRate(r, e) { feedbackRate = r; document.getElementById('customFeedbackRate').value = ''; document.querySelectorAll('.feedback-rate-btn').forEach(b => b.className = "feedback-rate-btn border p-3 rounded-xl text-base font-bold text-gray-500 bg-white"); e.className = "feedback-rate-btn border p-3 rounded-xl text-base font-bold border-primary bg-background text-primary"; }
        function setCustomFeedbackRate() { feedbackRate = parseFloat(document.getElementById('customFeedbackRate').value)/100 || 0; document.querySelectorAll('.feedback-rate-btn').forEach(b => b.className = "feedback-rate-btn border p-3 rounded-xl text-base font-bold text-gray-500 bg-white"); }
        function setFitRate(r, e) { fitRate = r; document.getElementById('customFitRate').value = ''; document.querySelectorAll('.fit-rate-btn').forEach(b => b.className = "fit-rate-btn border p-2.5 rounded-xl text-sm font-bold border-gray-200 bg-white"); e.className = "fit-rate-btn border p-2.5 rounded-xl text-sm font-bold border-primary bg-background text-primary"; }
        function setCustomFitRate() { fitRate = parseFloat(document.getElementById('customFitRate').value) || 0; document.querySelectorAll('.fit-rate-btn').forEach(b => b.className = "fit-rate-btn border p-2.5 rounded-xl text-sm font-bold border-gray-200 bg-white"); }
        function setSolarRate(r, e) { solarRate = r; document.getElementById('customSolarRate').value = ''; document.querySelectorAll('.solar-rate-btn').forEach(b => b.className = "solar-rate-btn border p-2.5 rounded-xl text-sm font-bold border-gray-200 bg-white"); e.className = "solar-rate-btn border p-2.5 rounded-xl text-sm font-bold border-primary bg-background text-primary"; }
        function setCustomSolarRate() { solarRate = parseFloat(document.getElementById('customSolarRate').value)/100 || 0; document.querySelectorAll('.solar-rate-btn').forEach(b => b.className = "solar-rate-btn border p-2.5 rounded-xl text-sm font-bold border-gray-200 bg-white"); }
        function setBridgeStatus(m, e) { bridgeMultiplier = m; document.querySelectorAll('.bridge-status-btn').forEach(b => b.className = "bridge-status-btn border p-3 rounded-xl text-sm font-bold border-gray-200 bg-white"); e.className = "bridge-status-btn border p-3 rounded-xl text-sm font-bold border-primary bg-background text-primary"; }
        
        function performCalculation() {
            const date = new Date().toLocaleDateString(); document.getElementById('pdfDate').innerText = date;
            ['resFeedbackGroup', 'resSolarGroup', 'resUtilityGroup', 'resBridgeGroup'].forEach(g => document.getElementById(g).classList.add('hidden'));
            let res = { date, note: "", cat: "", amt: "" };
            if (currentMode === 'feedback') {
                const note = document.getElementById('landNote1').value || "未註記"; const area = parseFloat(document.getElementById('area').value); const pv = parseFloat(document.getElementById('presentValue').value);
                if (!area || !pv) return alert("請填寫面積與現值"); const fee = Math.round(area * pv * feedbackRate);
                document.getElementById('resNote').innerText = note; document.getElementById('resCategory').innerText = "回饋金試算";
                document.getElementById('resAreaText').innerText = area + " ㎡"; document.getElementById('resPresentValueText').innerText = "$" + pv.toLocaleString();
                document.getElementById('resRate').innerText = (feedbackRate*100) + "%"; document.getElementById('resFeedbackFee').innerText = "$" + fee.toLocaleString();
                document.getElementById('resFeedbackGroup').classList.remove('hidden'); res = { date, note, cat: "回饋金", amt: "$"+fee.toLocaleString() };
            } else if (currentMode === 'solar') {
                const note = document.getElementById('landNote2').value || "未註記"; const p = parseFloat(document.getElementById('solarPing').value); const h = parseFloat(document.getElementById('solarSunHours').value);
                if (!p || !h) return alert("請填寫坪數與日照"); const rent = Math.round((p/2) * h * 365 * fitRate * solarRate);
                document.getElementById('resNote').innerText = note; document.getElementById('resCategory').innerText = "太陽能收益";
                document.getElementById('resSolarPingValue').innerText = p + " 坪"; document.getElementById('resSolarKwValue').innerText = (p/2) + " KW";
                document.getElementById('resSolarRent').innerText = "$" + rent.toLocaleString();
                document.getElementById('resSolarGroup').classList.remove('hidden'); res = { date, note, cat: "太陽能", amt: "$"+rent.toLocaleString() };
            } else if (currentMode === 'utility') {
                const hp = parseFloat(document.getElementById('hpValue').value) || 0; const pc = parseInt(document.getElementById('peopleCount').value) || 0;
                const kw = (hp * 0.75).toFixed(2); const water = (pc * 150 / 4 / 1000).toFixed(2);
                document.getElementById('resNote').innerText = "廠區水電"; document.getElementById('resCategory').innerText = "需求評估";
                document.getElementById('resKw').innerText = kw + " KW"; document.getElementById('resWater').innerText = water + " CMD";
                document.getElementById('resUtilityGroup').classList.remove('hidden'); res = { date, note: "廠區水電", cat: "水電", amt: kw+"KW/"+water+"CMD" };
            } else if (currentMode === 'bridge') {
                const note = document.getElementById('landNote3').value || "未註記"; const l = parseFloat(document.getElementById('bridgeLength').value); const w = parseFloat(document.getElementById('bridgeWidth').value); const lv = parseFloat(document.getElementById('bridgeLandValue').value);
                if (!l || !w || !lv) return alert("請填寫架橋資訊"); const fee = Math.round(l * w * lv * 0.05 * bridgeMultiplier);
                document.getElementById('resNote').innerText = note; document.getElementById('resCategory').innerText = "架橋規費";
                document.getElementById('resBridgeArea').innerText = (l*w).toFixed(2) + " ㎡"; document.getElementById('resBridgeTotal').innerText = "$" + fee.toLocaleString();
                document.getElementById('resBridgeGroup').classList.remove('hidden'); res = { date, note, cat: "架橋", amt: "$"+fee.toLocaleString() };
            }
            document.getElementById('resultCard').classList.remove('hidden'); saveToHistory(res);
        }

        function exportToPDF() {
            const btn = event.currentTarget; btn.innerHTML = "產生中..."; btn.disabled = true;
            
            // 直接從畫面獲取內容，不依賴變數
            const note = document.getElementById('resNote').innerText;
            const cat = document.getElementById('resCategory').innerText;
            const date = document.getElementById('pdfDate').innerText;

            // 找出當前顯示的數據區塊
            let rowsHtml = "";
            const groups = [
                {id: 'resFeedbackGroup', rows: [
                    {l: '土地面積', v: document.getElementById('resAreaText').innerText},
                    {l: '公告現值', v: document.getElementById('resPresentValueText').innerText},
                    {l: '回饋金比例', v: document.getElementById('resRate').innerText},
                    {l: '預估回饋金', v: document.getElementById('resFeedbackFee').innerText, highlight: true}
                ]},
                {id: 'resSolarGroup', rows: [
                    {l: '屋頂坪數', v: document.getElementById('resSolarPingValue').innerText},
                    {l: '發電容量', v: document.getElementById('resSolarKwValue').innerText},
                    {l: '年度租金收益', v: document.getElementById('resSolarRent').innerText, highlight: true}
                ]},
                {id: 'resUtilityGroup', rows: [
                    {l: '電力需求', v: document.getElementById('resKw').innerText},
                    {l: '日用水量', v: document.getElementById('resWater').innerText}
                ]},
                {id: 'resBridgeGroup', rows: [
                    {l: '架橋面積', v: document.getElementById('resBridgeArea').innerText},
                    {l: '預估總規費', v: document.getElementById('resBridgeTotal').innerText, highlight: true}
                ]}
            ];

            groups.forEach(g => {
                if (!document.getElementById(g.id).classList.contains('hidden')) {
                    g.rows.forEach(r => {
                        rowsHtml += `
                            <tr>
                                <td style="padding: 12px; border-bottom: 1px solid #eee; color: #666;">${r.l}</td>
                                <td style="padding: 12px; border-bottom: 1px solid #eee; text-align: right; font-weight: bold; color: ${r.highlight ? '#be595b' : '#333'}; font-size: ${r.highlight ? '18px' : '14px'};">${r.v}</td>
                            </tr>
                        `;
                    });
                }
            });

            const html = `
                <div style="font-family: sans-serif; padding: 40px; color: #333;">
                    <div style="text-align: center; color: #be595b; font-size: 28px; font-weight: bold; border-bottom: 3px solid #be595b; padding-bottom: 15px; margin-bottom: 30px;">土地開發評估報告</div>
                    
                    <table style="width: 100%; border-collapse: collapse; background: #fbf5f5; border-radius: 10px; margin-bottom: 30px;">
                        <tr><td style="padding: 15px; color: #666;">地段地號</td><td style="padding: 15px; text-align: right; font-weight: bold;">${note}</td></tr>
                        <tr><td style="padding: 15px; color: #666;">評估類別</td><td style="padding: 15px; text-align: right; font-weight: bold;">${cat}</td></tr>
                        <tr><td style="padding: 15px; color: #666;">產出日期</td><td style="padding: 15px; text-align: right; font-weight: bold;">${date}</td></tr>
                    </table>

                    <div style="font-size: 18px; font-weight: bold; color: #be595b; margin-bottom: 15px; padding-left: 10px; border-left: 5px solid #be595b;">詳細試算數據</div>
                    <table style="width: 100%; border-collapse: collapse;">
                        ${rowsHtml}
                    </table>

                    <div style="margin-top: 50px; padding-top: 20px; border-top: 1px solid #eee; text-align: center; font-size: 12px; color: #999;">
                        本報告由土地開發綜合試算工具自動產生，僅供初步參考，實際數據請以政府機關核定為準。
                    </div>
                </div>
            `;

            const opt = {
                margin: 10,
                filename: `土地開發報告_${note}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true, letterRendering: true },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            html2pdf().set(opt).from(html).save().then(() => {
                btn.innerHTML = "匯出 PDF 報告 📄"; btn.disabled = false;
            }).catch(err => {
                alert("PDF 失敗"); btn.innerHTML = "匯出 PDF 報告 📄"; btn.disabled = false;
            });
        }

        function saveToHistory(i) { let h = JSON.parse(localStorage.getItem('land_calc_history') || '[]'); h.unshift(i); h = h.slice(0, 10); localStorage.setItem('land_calc_history', JSON.stringify(h)); renderHistory(); }
        function renderHistory() {
            const h = JSON.parse(localStorage.getItem('land_calc_history') || '[]'); const l = document.getElementById('historyList');
            l.innerHTML = h.length ? h.map(i => `<div style="background:#f9f9f9; padding:10px; border-radius:8px; display:flex; justify-content:space-between; font-size:12px; margin-bottom:5px;"><div><b>${i.note}</b><br><small>${i.date} ${i.cat}</small></div><div style="color:#be595b; font-weight:bold;">${i.amt}</div></div>`).join('') : '<p style="text-align:center; color:#ccc; font-size:12px;">尚無紀錄</p>';
            document.getElementById('btnClearHistory').classList.toggle('hidden', !h.length);
        }
        function clearHistory() { if(confirm('清除？')){localStorage.removeItem('land_calc_history'); renderHistory();} }
        function toggleHistory() { const s = document.getElementById('historySection'); s.classList.toggle('expanded'); document.getElementById('historyChevron').style.transform = s.classList.contains('expanded') ? 'rotate(180deg)' : 'rotate(0deg)'; }
        window.onload = () => { renderHistory(); if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js'); };
    </script>
</body>
</html>
