<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#245c4f">
  <meta name="description" content="土地開發回饋金、太陽能、水電與架橋規費試算工具">
  <title>土地開發試算工具</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <svg class="svg-defs" aria-hidden="true">
    <symbol id="icon-land" viewBox="0 0 24 24"><path d="M3 17.5 8 14l4 3 4-3 5 3.5M3 12.5 8 9l4 3 4-3 5 3.5M3 7.5 8 4l4 3 4-3 5 3.5"/></symbol>
    <symbol id="icon-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M19.1 4.9l-1.4 1.4M6.3 17.7l-1.4 1.4"/></symbol>
    <symbol id="icon-water" viewBox="0 0 24 24"><path d="M12 3s6 6.4 6 11a6 6 0 0 1-12 0c0-4.6 6-11 6-11Z"/><path d="M9 15.5c.7 1 1.7 1.5 3 1.5"/></symbol>
    <symbol id="icon-bridge" viewBox="0 0 24 24"><path d="M3 18h18M5 18v-5M19 18v-5M5 13c2.2 0 3.2-4 7-4s4.8 4 7 4M3 13h2M19 13h2"/></symbol>
    <symbol id="icon-plus" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></symbol>
    <symbol id="icon-trash" viewBox="0 0 24 24"><path d="M4 7h16M9 7V4h6v3M7 7l1 13h8l1-13"/></symbol>
    <symbol id="icon-share" viewBox="0 0 24 24"><path d="M12 16V3M7 8l5-5 5 5M5 12v8h14v-8"/></symbol>
    <symbol id="icon-download" viewBox="0 0 24 24"><path d="M12 3v13M7 11l5 5 5-5M5 21h14"/></symbol>
    <symbol id="icon-clock" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></symbol>
  </svg>

  <header class="app-header">
    <div>
      <p class="eyebrow">內部試算工具</p>
      <h1>土地開發試算</h1>
    </div>
    <button class="history-toggle" id="historyToggle" type="button" aria-controls="historyPanel" aria-expanded="false">
      <svg><use href="#icon-clock"/></svg>
      紀錄
    </button>
  </header>

  <main>
    <nav class="tabs" aria-label="試算類型">
      <button class="tab active" type="button" data-mode="feedback"><svg><use href="#icon-land"/></svg><span>回饋金</span></button>
      <button class="tab" type="button" data-mode="solar"><svg><use href="#icon-sun"/></svg><span>太陽能</span></button>
      <button class="tab" type="button" data-mode="utility"><svg><use href="#icon-water"/></svg><span>水電</span></button>
      <button class="tab" type="button" data-mode="bridge"><svg><use href="#icon-bridge"/></svg><span>架橋規費</span></button>
    </nav>

    <aside id="historyPanel" class="history-panel hidden" aria-label="最近試算紀錄">
      <div class="section-heading">
        <div><p class="step">本機資料</p><h2>最近 10 筆紀錄</h2></div>
        <button id="clearHistory" class="text-button" type="button">清除全部</button>
      </div>
      <div id="historyList" class="history-list"></div>
    </aside>

    <form id="calculatorForm" novalidate>
      <section class="calculator-section" data-section="feedback">
        <div class="section-heading">
          <div><p class="step">土地變更</p><h2>回饋金試算</h2></div>
        </div>
        <label class="field">
          <span>客戶名稱 <small>選填</small></span>
          <input id="feedbackCustomer" type="text" maxlength="50" placeholder="例如：王先生">
        </label>
        <div class="parcel-heading">
          <div><span class="field-title">土地資料</span><small>每筆地號分別填寫</small></div>
          <button id="addParcel" class="secondary-button compact" type="button"><svg><use href="#icon-plus"/></svg>新增地號</button>
        </div>
        <div id="parcelList" class="parcel-list"></div>
        <fieldset class="choice-field">
          <legend>回饋金繳交比例</legend>
          <div class="segmented">
            <label><input type="radio" name="feedbackRate" value="50" checked><span>特目變更 50%</span></label>
            <label><input type="radio" name="feedbackRate" value="custom"><span>自訂</span></label>
          </div>
          <label class="field inline-custom hidden" id="feedbackCustomWrap">
            <span>自訂比例</span>
            <span class="input-unit"><input id="feedbackCustomRate" type="number" min="0.01" max="100" step="0.01" inputmode="decimal" placeholder="輸入比例"><b>%</b></span>
          </label>
        </fieldset>
      </section>

      <section class="calculator-section hidden" data-section="solar">
        <div class="section-heading"><div><p class="step">再生能源</p><h2>太陽能收益試算</h2></div></div>
        <label class="field"><span>客戶名稱 <small>選填</small></span><input id="solarCustomer" type="text" maxlength="50" placeholder="例如：王先生"></label>
        <label class="field"><span>地段地號</span><input id="solarLandNo" type="text" maxlength="80" placeholder="例如：某某段 123 地號"></label>
        <div class="field-grid">
          <label class="field"><span>屋頂可建坪數</span><span class="input-unit"><input id="solarPing" type="number" min="0.01" step="0.01" inputmode="decimal" placeholder="輸入坪數"><b>坪</b></span><small id="solarKwHint">預估容量 0.00 KW</small></label>
          <label class="field"><span>平均日照時間</span><span class="input-unit"><input id="sunHours" type="number" min="0.01" step="0.1" inputmode="decimal" value="3.5"><b>小時/天</b></span></label>
        </div>
        <div class="field-grid">
          <label class="field"><span>台電收購費率</span><span class="input-unit"><input id="fitRate" type="number" min="0.0001" step="0.0001" inputmode="decimal" value="3.8772"><b>元/度</b></span></label>
          <label class="field"><span>租金分潤比例</span><span class="input-unit"><input id="solarRate" type="number" min="0.01" max="100" step="0.01" inputmode="decimal" value="20"><b>%</b></span></label>
        </div>
      </section>

      <section class="calculator-section hidden" data-section="utility">
        <div class="section-heading"><div><p class="step">廠區需求</p><h2>水電需求試算</h2></div></div>
        <div class="notice">馬力數與人數至少填寫一項；未填項目將以 0 計算。</div>
        <div class="field-grid">
          <label class="field"><span>設備總馬力</span><span class="input-unit"><input id="horsepower" type="number" min="0" step="0.01" inputmode="decimal" placeholder="輸入馬力"><b>HP</b></span></label>
          <label class="field"><span>評估人數</span><span class="input-unit"><input id="people" type="number" min="0" step="1" inputmode="numeric" placeholder="輸入人數"><b>人</b></span></label>
        </div>
      </section>

      <section class="calculator-section hidden" data-section="bridge">
        <div class="section-heading"><div><p class="step">渠道使用</p><h2>架橋規費試算</h2></div></div>
        <label class="field"><span>客戶名稱 <small>選填</small></span><input id="bridgeCustomer" type="text" maxlength="50" placeholder="例如：王先生"></label>
        <label class="field"><span>地段地號</span><input id="bridgeLandNo" type="text" maxlength="80" placeholder="例如：某某段 123 地號"></label>
        <div class="field-grid">
          <label class="field"><span>預計長度</span><span class="input-unit"><input id="bridgeLength" type="number" min="0.01" step="0.01" inputmode="decimal" placeholder="輸入長度"><b>公尺</b></span></label>
          <label class="field"><span>預計寬度</span><span class="input-unit"><input id="bridgeWidth" type="number" min="0.01" step="0.01" inputmode="decimal" placeholder="輸入寬度"><b>公尺</b></span></label>
        </div>
        <label class="field"><span>渠道土地公告現值</span><span class="input-unit"><input id="bridgeValue" type="number" min="0.01" step="1" inputmode="decimal" placeholder="輸入公告現值"><b>元/㎡</b></span></label>
        <fieldset class="choice-field">
          <legend>架橋設置狀態</legend>
          <div class="segmented">
            <label><input type="radio" name="bridgeYears" value="20" checked><span>新設（20 年）</span></label>
            <label><input type="radio" name="bridgeYears" value="25"><span>既設（含追繳 5 年）</span></label>
          </div>
        </fieldset>
      </section>

      <div id="formError" class="form-error hidden" role="alert"></div>
      <button class="primary-button" type="submit">開始計算</button>
    </form>

    <section id="resultSection" class="result-section hidden" aria-live="polite">
      <div class="result-card">
        <p class="step">試算完成</p>
        <h2 id="resultTitle"></h2>
        <div id="resultMeta" class="result-meta"></div>
        <div id="resultDetails" class="result-details"></div>
        <div class="result-total"><span id="resultTotalLabel"></span><strong id="resultTotal"></strong></div>
        <p class="disclaimer">本工具僅供初步估算參考，實際金額與申請條件請以主管機關核定為準。</p>
      </div>
      <div class="result-actions">
        <button id="shareImage" class="primary-button" type="button"><svg><use href="#icon-share"/></svg>分享結果圖片</button>
        <button id="downloadImage" class="secondary-button" type="button"><svg><use href="#icon-download"/></svg>儲存 PNG</button>
      </div>
      <p id="shareStatus" class="share-status" aria-live="polite"></p>
    </section>
  </main>

  <template id="parcelTemplate">
    <article class="parcel-card">
      <div class="parcel-card-head"><strong>地號 <span class="parcel-number"></span></strong><button class="icon-button remove-parcel" type="button" aria-label="刪除此地號"><svg><use href="#icon-trash"/></svg></button></div>
      <label class="field"><span>地段地號</span><input class="parcel-land-no" type="text" maxlength="80" placeholder="例如：某某段 123 地號"></label>
      <div class="field-grid">
        <label class="field"><span>土地面積</span><span class="input-unit"><input class="parcel-area" type="number" min="0.01" step="0.01" inputmode="decimal" placeholder="輸入面積"><b>㎡</b></span><small class="parcel-ping">約 0.00 坪</small></label>
        <label class="field"><span>公告土地現值</span><span class="input-unit"><input class="parcel-value" type="number" min="0.01" step="1" inputmode="decimal" placeholder="輸入現值"><b>元/㎡</b></span></label>
      </div>
    </article>
  </template>

  <script src="app.js" defer></script>
</body>
</html>
